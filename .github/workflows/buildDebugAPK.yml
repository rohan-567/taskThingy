name: Build Debug FAT APK

on:
  push:
    branches: [ master ]
    paths:
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'android/**'
      - '.github/workflows/build-debug-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          cache: true
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Build debug FAT APK
        run: flutter build apk --debug
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/apk/debug/app-universal-debug.apk
          tag_name: debug-${{ github.run_number }}
          name: Debug Build #${{ github.run_number }}
          body: |
            Debug APK build from commit ${{ github.sha }}
            Install on any Android device (unknown sources enabled)
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
